version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: mrp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mrp
      POSTGRES_USER: mrp
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mrp_secret_2026}
    volumes:
      - mrp_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mrp -d mrp"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mrp-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6381:6379"
    volumes:
      - mrp_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: mrp-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://mrp:${DB_PASSWORD:-mrp_secret_2026}@db:5432/mrp
      REDIS_URL: redis://redis:6379/0
      API_PREFIX: /api/v1
      CORS_ORIGINS: "*"
    ports:
      - "127.0.0.1:8087:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        python -m scripts.init_db &&
        python -m scripts.seed_data &&
        uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2
      "

  nginx:
    image: nginx:alpine
    container_name: mrp-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  mrp_pgdata:
  mrp_redisdata:
