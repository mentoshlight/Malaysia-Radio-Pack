server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # Static files — short cache, bust with ?v= param on updates
    location /static/ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # API reverse proxy
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # Fix FastAPI 307 redirects losing port
        proxy_redirect http://api:8000/ /;
        proxy_redirect ~^http://[^:]+(/api/.*)$ http://$host:$server_port$1;
    }

    # Dashboard — no cache
    location = / {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files /templates/index.html =404;
    }

    # Frontend
    location / {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ /templates/index.html;
    }
}
